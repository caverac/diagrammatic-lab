name: Deploy Development

# Runs after the Release workflow so the version bump semantic-release commits
# to main is already in place - the deployed bundle matches the latest release.
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]

# OIDC token + repo read; no long-lived AWS credentials.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    # Only after a successful Release on main.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    environment: development
    env:
      ENVIRONMENT: development
      AWS_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: us-east-1
      ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # workflow_run defaults to the triggering SHA (pre-bump); take main's
          # tip, which includes the release commit.
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web app
        run: yarn workspace @diagrammatic-lab/web build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/DiagrammaticLab-GitHubActions-Role
          aws-region: us-east-1

      - name: Deploy web stack
        run: yarn workspace @diagrammatic-lab/infrastructure cdk deploy DiagrammaticLab-Web --require-approval never
